name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main # Deploys automatically whenever changes cross into the main branch
  workflow_dispatch: # Allows you to trigger a deploy manually if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout Repository Files
        uses: actions/checkout@v4

      - name: Install Supabase CLI Core
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy All Active Edge Functions
        run: supabase functions deploy --project-ref $PROJECT_ID
